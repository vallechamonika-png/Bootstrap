<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Shop</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Lucida Sans', Geneva, Verdana, sans-serif;
        }

        body{
            background-color: #f5f5f5;
        }

        header{
    position:relative;

    width:100%;
    height:100vh;

    overflow:hidden;

    color:white;
}
.hero-video{
    position:absolute;

    top:0;
    left:0;

    width:100%;
    height:100%;

    object-fit:cover;

    z-index:0;
}

header::before{
    content:'';

    position:absolute;

    top:0;
    left:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,0.55);

    z-index:1;
}

        nav{
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 60px;
            position:relative;

    top:0;
    z-index:999;
    width: 100%;
        }

         .logo{
    color:#b07d4f;
    font-size:30px;
    font-weight:bold;
    animation:float 3s infinite ease-in-out;
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-10px);
    }
}

        nav ul{
            display: flex;
            list-style: none;
            gap: 30px;
        }

        nav ul li a{
            text-decoration: none;
            color: beige;
position: relative;
        }

        nav ul li a::after{
    content:'';
    position:absolute;
    width:0;
    height:2px;
    left:0;
    bottom:-5px;
    background:#d4a373;
    transition:.4s;
}

nav ul li a:hover::after{
    width:100%;
}

        .hero{
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 80vh;
            text-align: center;
            padding: 20px;

            position:relative;
z-index:2;
        }

        .hero h1{
    font-size:50px;

    text-shadow:
    0 5px 20px rgba(0,0,0,0.5);

    margin-bottom:20px;

    color: beige;
     animation:fadeUp 1.2s ease;
}

        .hero p{
            font-size: 20px;
            margin-bottom: 30px;
            max-width: 700px;
            line-height: 1.6;
            color: antiquewhite;
              animation:fadeUp 1.4s ease;
        }

       .btn{
    position:relative;
    overflow:hidden;

    display:inline-block;

    padding:16px 40px;

    border-radius:50px;
    border:none;

    background:linear-gradient(135deg,#d4a373,#b07d4f);

    color:white;
    text-decoration:none;

    font-size:18px;
    font-weight:600;

    box-shadow:0 8px 25px rgba(176,125,79,.25);

    transition:
        transform 0.35s cubic-bezier(.22,1,.36,1),
        box-shadow 0.35s cubic-bezier(.22,1,.36,1),
        background 0.35s ease;

        animation:fadeUp 1.6s ease;
}


.btn:hover{
    transform:translateY(-4px);

    box-shadow:
        0 15px 35px rgba(176,125,79,.35);

    background:
        linear-gradient(
            135deg,
            #e2b07f,
            #c48a54
        );
}

.btn:active{
    transform:
    translateY(-2px)
    scale(.98);
}

.btn::before{
    content:"";

    position:absolute;
    top:0;
    left:-100%;

    width:50%;
    height:100%;

    background:
        linear-gradient(
            90deg,
            transparent,
            rgba(255,255,255,.35),
            transparent
        );

    transform:skewX(-20deg);

    transition:left .8s ease;
}

.btn:hover::before{
    left:160%;
}

.btn:hover::before{
    left:150%;
}
        .hero-buttons{
    display:flex;
    gap:20px;
}

        .btn:hover{
            background: #b07d4f;
        }
        @keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

      


       


        /* Responsive Design */

        @media(max-width:770px){

            nav{
                padding: 20px;
                flex-direction: column;
                gap: 15px;
            }

            nav ul{
                gap: 15px;
            }

            .hero h1{
                font-size: 40px;
            }

            .hero p{
                font-size: 18px;
            }
        }

    </style>

</head>

<body>

    <header>
        <video autoplay muted loop playsinline class="hero-video">

        <source src="https://www.pexels.com/download/video/8855727/" type="video/mp4">

    </video>




        

       

        <nav>

            <div class="logo"> ☕CoffeeToffee</div>

            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="About.html">About</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="contact.html">Contact </a></li>
                      <li><a href="feedback.html">Feedback</a></li>
            </ul>

        </nav>

        <div class="hero">

            <h1>Coffee Crafted For Every Mood </h1>

            <p>
                Our premium coffee is made with love and passion. <br>
                Experience the perfect taste, and relaxing atmosphere at CoffeeToffee. 
                
            </p>

            <div class="hero-buttons">

    <a href="menu.html" class="btn">
        Order Now
    </a>

    <a href="About.html" class="btn secondary-btn">
        Learn More
    </a>

</div>
        </div>
        
    </header>


         




    

</body>
</html>
