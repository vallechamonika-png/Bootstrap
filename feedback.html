<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoffeeToffee - Feedback</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#f5f5f5,#f0e6d8);
    min-height:100vh;
}

/* Navbar */

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:25px 60px;
    background:#4f3e2f;
    position:fixed;
    width:100%;
    top:0;
    z-index:1000;
}

.logo{
    color:#b07d4f;
    font-size:30px;
    font-weight:bold;
    animation:float 3s infinite ease-in-out;
}

nav ul{
    display:flex;
    list-style:none;
    gap:30px;
}

nav ul li a{
    color:white;
    text-decoration:none;
    position:relative;
}

nav ul li a::after{
    content:'';
    position:absolute;
    width:0;
    height:2px;
    left:0;
    bottom:-5px;
    background:#d4a373;
    transition:.4s;
}

nav ul li a:hover::after{
    width:100%;
}

/* Main Section */

.feedback-section{
    padding:140px 8%;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:60px;
    flex-wrap:wrap;
}

/* Illustration */

.feedback-image{
    flex:1;
    min-width:350px;
    text-align:center;
    animation:slideLeft 1s ease;
}

.feedback-image img{
    width:100%;
    max-width:500px;
    animation:float 4s infinite ease-in-out;
}

/* Form */

.feedback-card{
    flex:1;
    min-width:350px;
    background:rgba(255,255,255,.8);
    backdrop-filter:blur(10px);
    padding:40px;
    border-radius:25px;
    box-shadow:0 15px 35px rgba(0,0,0,.1);
    animation:slideRight 1s ease;
}

.feedback-card h1{
    color:#4f3e2f;
    margin-bottom:15px;
}

.feedback-card p{
    color:#666;
    margin-bottom:25px;
}

.feedback-card input,
.feedback-card textarea{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    background:#f8f8f8;
    outline:none;
    transition:.3s;
}

.feedback-card input:focus,
.feedback-card textarea:focus{
    box-shadow:0 0 10px rgba(176,125,79,.4);
}

.feedback-card textarea{
    resize:none;
    height:130px;
}

/* Rating */

.rating{
    margin:15px 0;
}

.rating span{
    font-size:30px;
    cursor:pointer;
    transition:.3s;
}

.rating span:hover{
    transform:scale(1.2);
}

/* Button */

.btn{
    width:100%;
    padding:15px;
    background:#b07d4f;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    background:#8b5e34;
    transform:translateY(-3px);
}

/* Footer */

footer{
    background:#4f3e2f;
    color:white;
    text-align:center;
    padding:20px;
}

/* Animations */

@keyframes slideLeft{
    from{
        opacity:0;
        transform:translateX(-50px);
    }
    to{
        opacity:1;
        transform:translateX(0);
    }
}

@keyframes slideRight{
    from{
        opacity:0;
        transform:translateX(50px);
    }
    to{
        opacity:1;
        transform:translateX(0);
    }
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-10px);
    }
}

/* Mobile */

@media(max-width:768px){

    nav{
        flex-direction:column;
        gap:15px;
    }

    .feedback-section{
        padding-top:180px;
    }
}

</style>
</head>

<body>

<nav>
    <div class="logo">☕ CoffeeToffee</div>

    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="About.html">About</a></li>
        <li><a href="menu.html">Menu</a></li>
        <li><a href="contact.html">Contact</a></li>
         <li><a href="feedback.html">Feedback</a></li>
    </ul>
</nav>

<section class="feedback-section">

    <div class="feedback-image">

        <img src="https://cdn-icons-png.flaticon.com/512/924/924514.png" alt="Coffee Feedback">

    </div>

    <div class="feedback-card">

        <h1>Share Your Experience ☕</h1>

        <p>
            Your feedback helps us brew better coffee and create
            unforgettable moments for our customers.
        </p>

        <form>

            <input type="text" placeholder="Your Name" required>

            <input type="email" placeholder="Your Email" required>

            <div class="rating">
                <span>⭐</span>
                <span>⭐</span>
                <span>⭐</span>
                <span>⭐</span>
                <span>⭐</span>
            </div>

            <textarea placeholder="Tell us about your experience..."></textarea>

            <button class="btn">
                Submit Feedback
            </button>

        </form>

    </div>

</section>

<footer>
    <p>© 2026 CoffeeToffee | Crafted With Love & Coffee ☕</p>
</footer>

</body>
</html>
